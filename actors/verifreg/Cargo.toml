[package]
name = "fil_actor_verifreg_state"
description = "Builtin verifreg actor for Filecoin"
license.workspace = true
repository.workspace = true
authors.workspace = true
edition.workspace = true
version.workspace = true
keywords.workspace = true

[lib]
## lib is necessary for integration tests
## cdylib is necessary for Wasm build
crate-type = ["cdylib", "lib"]

[dependencies]
anyhow = { workspace = true }
cid = { workspace = true }
fil_actors_shared = { workspace = true }
frc42_dispatch = { workspace = true }
frc42_macros = { workspace = true }
fvm_ipld_blockstore = { workspace = true }
fvm_ipld_encoding = { workspace = true }
fvm_shared = { workspace = true }
fvm_shared3 = { workspace = true }
fvm_shared4 = { workspace = true }
log = { workspace = true }
num-derive = { workspace = true }
num-traits = { workspace = true }
serde = { workspace = true }

# Optional: JSON value conversion
fil_actor_json_derive = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

[dev-dependencies]
serde_json = { workspace = true }
fil_actors_shared = { workspace = true, features = ["json"] }

[features]
default = []
json = ["dep:fil_actor_json_derive", "dep:serde_json", "fil_actors_shared/json"]
